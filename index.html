<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Genie Game Forge</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #020617; color: #f8fafc; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        #game-canvas { background: #000; border: 3px solid #38bdf8; width: 100%; height: 400px; border-radius: 8px; margin-top: 20px; }
        .prompt-box { background: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid #334155; }
        input { width: 80%; padding: 12px; border-radius: 6px; border: none; background: #0f172a; color: #38bdf8; font-weight: bold; }
        button { padding: 12px 24px; border-radius: 6px; border: none; background: #38bdf8; color: #0f172a; cursor: pointer; font-weight: bold; }
        .research-log { margin-top: 30px; font-size: 0.8rem; color: #64748b; border-top: 1px solid #334155; padding-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧞 Genie Game Forge</h1>
        
        <div class="prompt-box">
            <p>What game should we build using the current research?</p>
            <input type="text" id="user-prompt" placeholder="e.g. A red square that jumps over blue obstacles">
            <button onclick="forgeGame()">FORGE GAME</button>
        </div>

        <canvas id="game-canvas"></canvas>

        <div class="research-log">
            <h3>Current Brain Data:</h3>
            <div id="brain-data">Syncing knowledge...</div>
        </div>
    </div>

    <script>
        // This function will eventually talk to a real AI API
        // For now, it "forges" a game based on your research!
        function forgeGame() {
            const prompt = document.getElementById('user-prompt').value;
            const canvas = document.getElementById('game-canvas');
            const ctx = canvas.getContext('2d');
            
            alert("Genie is analyzing research to build: " + prompt);
            
            // Basic Game Engine Start
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#38bdf8";
            ctx.fillRect(50, 50, 50, 50); // The AI "starts" the project
            ctx.fillStyle = "white";
            ctx.fillText("AI Game Engine Initialized...", 10, 20);
        }

        async function loadResearch() {
            const res = await fetch('ai_brain.json?v=' + Date.now());
            const data = await res.json();
            document.getElementById('brain-data').innerText = JSON.stringify(data[0].data).substring(0, 300) + "...";
        }
        loadResearch();
    </script>
</body>
</html>
