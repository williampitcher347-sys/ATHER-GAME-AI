
<!DOCTYPE html>
<html>
<head>
    <title>Genie Cloud Dashboard</title>
    <style>
        body { background: #0d1117; color: #58a6ff; font-family: sans-serif; padding: 20px; }
        .card { background: #161b22; border: 1px solid #30363d; padding: 15px; margin-bottom: 10px; border-radius: 6px; }
        h1 { color: #f0f6fc; }
        .url { font-size: 0.8em; color: #8b949e; }
    </style>
</head>
<body>
    <h1>Genie Live Intelligence</h1>
    <div id="output">Loading AI Brain...</div>

    <script>
        async function loadBrain() {
            try {
                // This fetches the data file created by your agent.py
                const response = await fetch('ai_brain.json');
                const data = await response.json();
                const container = document.getElementById('output');
                container.innerHTML = '';

                data.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'card';
                    div.innerHTML = `
                        <div class="url">${item.url}</div>
                        <p>${item.data.substring(0, 200)}...</p>
                    `;
                    container.appendChild(div);
                });
            } catch (e) {
                document.getElementById('output').innerText = "Brain is currently empty. Run the Action to start research!";
            }
        }
        loadBrain();
    </script>
</body>
</html>
