<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GENIE AI | COMMAND CENTER</title>
    <style>
        :root { --accent: #00f2ff; --bg: #020617; --panel: #0f172a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; height: 100vh; }
        
        /* Left: Control Panel */
        .controls { width: 350px; background: var(--panel); border-right: 1px solid #1e293b; padding: 25px; display: flex; flex-direction: column; }
        
        /* Right: Knowledge Stream */
        .stream { flex: 1; padding: 40px; overflow-y: auto; background: linear-gradient(180deg, #020617 0%, #070e1d 100%); }

        h1 { font-size: 1.2rem; color: var(--accent); letter-spacing: 3px; margin-bottom: 30px; }
        .input-group { background: #1e293b; padding: 15px; border-radius: 8px; border: 1px solid #334155; }
        input { width: 100%; background: none; border: none; color: white; outline: none; font-family: monospace; }
        button { width: 100%; margin-top: 15px; padding: 12px; background: var(--accent); color: black; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { filter: brightness(1.2); transform: scale(1.02); }

        /* Research Cards */
        .card { background: #1e293b66; border: 1px solid #334155; border-radius: 12px; padding: 20px; margin-bottom: 20px; backdrop-filter: blur(10px); transition: 0.3s; }
        .card:hover { border-color: var(--accent); background: #1e293b; }
        .card-header { display: flex; justify-content: space-between; font-size: 0.7rem; color: var(--accent); margin-bottom: 10px; opacity: 0.7; }
        .card-title { font-weight: bold; margin-bottom: 8px; display: block; color: #e2e8f0; }
        .card-body { font-size: 0.9rem; line-height: 1.6; color: #94a3b8; }
        
        .status-dot { width: 8px; height: 8px; background: #10b981; border-radius: 50%; display: inline-block; margin-right: 8px; box-shadow: 0 0 8px #10b981; }
    </style>
</head>
<body>

    <div class="controls">
        <h1>GENIE FORGE</h1>
        <div style="font-size: 0.8rem; margin-bottom: 20px;"><span class="status-dot"></span>SYSTEMS ACTIVE</div>
        
        <div class="input-group">
            <input type="text" id="game-prompt" placeholder="Describe a game feature...">
        </div>
        <button onclick="buildAsset()">FORGE CODE</button>

        <div id="forge-status" style="margin-top: 20px; font-size: 0.8rem; color: #64748b; font-family: monospace;">
            Ready for input...
        </div>
    </div>

    <div class="stream">
        <h2 style="font-size: 0.8rem; color: #64748b; text-transform: uppercase; margin-bottom: 20px;">Live Research Stream</h2>
        <div id="output">Syncing brain...</div>
    </div>

    <script>
        async function updateDashboard() {
            try {
                // The cache-buster ensures real-time updates
                const res = await fetch('ai_brain.json?v=' + Date.now());
                const data = await res.json();
                const container = document.getElementById('output');
                container.innerHTML = '';

                data.forEach(item => {
                    container.innerHTML += `
                        <div class="card">
                            <div class="card-header">
                                <span>SOURCE: ${new URL(item.url).hostname}</span>
                                <span>${item.timestamp}</span>
                            </div>
                            <b class="card-title">${item.title}</b>
                            <div class="card-body">${item.data}</div>
                        </div>
                    `;
                });
            } catch (e) {
                console.log("Waiting for robot to finish...");
            }
        }

        function buildAsset() {
            const prompt = document.getElementById('game-prompt').value;
            document.getElementById('forge-status').innerHTML = "> Analyzing: " + prompt + "<br>> Fetching research metadata...<br>> Generation started.";
        }

        // Refresh the UI every 15 seconds
        setInterval(updateDashboard, 15000);
        updateDashboard();
    </script>
</body>
</html>
