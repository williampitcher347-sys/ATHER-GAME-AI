<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AETHER-GEN | AI RESEARCH TERMINAL</title>
    <style>
        :root { --neon: #00ffcc; --bg: #050505; --panel: #111; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; }
        
        /* Sidebar */
        #sidebar { width: 260px; background: var(--panel); border-right: 1px solid #222; padding: 20px; }
        .logo { color: var(--neon); font-weight: bold; letter-spacing: 3px; margin-bottom: 30px; }
        
        /* Main Terminal */
        #main { flex: 1; padding: 30px; display: flex; flex-direction: column; }
        #console { flex: 1; background: #000; border-radius: 8px; border: 1px solid #333; padding: 20px; font-family: 'Courier New', monospace; overflow-y: auto; color: #aaa; }
        .log-entry { margin-bottom: 8px; border-left: 2px solid var(--neon); padding-left: 10px; animation: fadeIn 0.3s; }
        .highlight { color: var(--neon); }

        /* Controls */
        #controls { margin-top: 20px; display: flex; gap: 10px; }
        input { flex: 1; background: #1a1a1a; border: 1px solid #333; padding: 12px; color: #fff; border-radius: 4px; outline: none; }
        input:focus { border-color: var(--neon); }
        button { background: var(--neon); color: #000; border: none; padding: 12px 25px; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { transform: scale(1.05); filter: brightness(1.1); }

        @keyframes fadeIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>
    <div id="sidebar">
        <div class="logo">GENIE_v3</div>
        <div style="font-size: 12px; color: #666;">KNOWLEDGE BASE: <span id="kb-size">0 KB</span></div>
        <div style="margin-top: 20px; color: var(--neon); font-size: 14px;">Active Crawlers: 12</div>
    </div>

    <div id="main">
        <div id="console">
            <div class="log-entry">System initialized... Standing by for Research Mission.</div>
        </div>

        <div id="controls">
            <input type="text" id="topic" placeholder="Target Subject (e.g., 'Unreal Engine 5 Physics C++')">
            <button onclick="startResearch()">INITIATE CRAWL</button>
        </div>
    </div>

    <script>
        function log(msg, isHighlight = false) {
            const consoleObj = document.getElementById('console');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            if (isHighlight) entry.innerHTML = `<span class="highlight">${msg}</span>`;
            else entry.innerText = msg;
            consoleObj.appendChild(entry);
            consoleObj.scrollTop = consoleObj.scrollHeight;
        }

        async function startResearch() {
            const topic = document.getElementById('topic').value;
            if(!topic) return;
            
            log(`Starting Deep-Crawl for: ${topic}...`, true);
            log("Opening Neural Pathways to Web Indices...");
            
            // In a real app, this would fetch from your Python backend
            // For now, we simulate the 'Genie' feedback
            setTimeout(() => log("Visiting: developer.unrealengine.com/docs/..."), 1000);
            setTimeout(() => log("Scraping patterns for 'Gravity_Component.cpp'..."), 2500);
            setTimeout(() => log("Optimizing Physics Logic (142 pages internalized)", true), 4000);
        }
    </script>
</body>
</html>
